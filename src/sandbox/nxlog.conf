Panic Soft
#NoFreeOnExit TRUE

define ROOT C:\Program Files\nxlog
define CERTDIR %ROOT%\cert
define CONFIGDIR %ROOT%\conf\nxlog.d
define LOGDIR %ROOT%\data

include %CONFIGDIR%\\*.conf
define LOGFILE %LOGDIR%\nxlog.log
LogFile %LOGFILE%

Moduledir %ROOT%\modules
CacheDir %ROOT%\data
Pidfile %ROOT%\data\nxlog.pid
SpoolDir %ROOT%\data

<Extension json>
    Module  xm_json
</Extension>

<Input sysmon>
    Module  im_msvistalog
    <QueryXML>
        <QueryList>
            <Query Id="0">
                <Select Path="Microsoft-Windows-Sysmon/Operational">*</Select>
            </Query>
        </QueryList>
    </QueryXML>
    Exec    to_json();
</Input>

<Output serial>
    Module om_exec
    Command "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe"
    Arg "-ExecutionPolicy"
    Arg "Bypass"
    Arg "-File"
    Arg "C:\Windows\System32\scripts\sysmon-serial-extractor.ps1"
</Output>

<Route sysmon_to_serial>
    Path sysmon => serial
</Route>
